apiVersion: v1
kind: ServiceAccount
metadata:
  name: build-deployer
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: build-deployer-role
  namespace: default
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: build-deployer-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: build-deployer
    namespace: default
roleRef:
  kind: Role
  name: build-deployer-role
  apiGroup: rbac.authorization.k8s.io
