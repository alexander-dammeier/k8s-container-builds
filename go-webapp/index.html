<!DOCTYPE html>
<html>
<head>
    <title>K8s Build Demo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 { color: #1a73e8; margin-bottom: 1rem; }
        p { color: #5f6368; line-height: 1.5; }
        .badge {
            display: inline-block;
            background: #e8f0fe;
            color: #1967d2;
            padding: 0.25rem 0.75rem;
            border-radius: 16px;
            font-size: 0.875rem;
            font-weight: 500;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 Success!</h1>
        <p>This Go web application was built inside a Kubernetes Pod using <strong>Buildah</strong>.</p>
        <div class="badge">Daemonless & Rootless</div>
        <p style="font-size: 0.8rem; margin-top: 2rem;">Built at: {{.BuildTime}}</p>
    </div>
</body>
</html>
