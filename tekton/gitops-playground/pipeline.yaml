apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: build-gitops-playground
spec:
  workspaces:
    - name: shared-workspace
      description: Workspace shared by clone and build tasks
  params:
    - name: git-url
      type: string
    - name: git-revision
      type: string
    - name: image
      type: string
    - name: skip-tests
      type: string
      default: "false"
  tasks:
    - name: fetch-repository
      taskRef:
        name: git-clone
      workspaces:
        - name: output
          workspace: shared-workspace
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.git-revision)
    - name: download-dependencies
      taskRef:
        name: maven-dependencies
      runAfter:
        - fetch-repository
      workspaces:
        - name: source
          workspace: shared-workspace
    - name: run-unit-tests
      taskRef:
        name: maven-test
      when:
        - input: "$(params.skip-tests)"
          operator: in
          values: ["false"]
      runAfter:
        - download-dependencies
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: build-image
      taskRef:
        name: buildah-build-push
      runAfter:
        - run-unit-tests
      workspaces:
        - name: source
          workspace: shared-workspace
      params:
        - name: image
          value: $(params.image)

    - name: scan-image
      taskRef:
        name: trivy-scan
      runAfter:
        - build-image
      params:
        - name: image
          value: $(params.image)
