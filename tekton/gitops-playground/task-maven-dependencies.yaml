apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: maven-dependencies
spec:
  workspaces:
    - name: source
      description: The workspace containing the cloned source code
  steps:
    - name: download
      image: eclipse-temurin:17-jdk-alpine
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        set -e
        echo "Downloading Maven dependencies..."
        
        chmod +x mvnw
        
        # dependency:go-offline resolves project dependencies and plugins
        # test-compile ensures that test-scoped dependencies are also fetched
        ./mvnw dependency:go-offline test-compile -Dmaven.repo.local=/m2-cache -Dmaven.test.skip=true
        
        echo "✅ Dependencies downloaded successfully!"
      volumeMounts:
        - name: m2-cache
          mountPath: /m2-cache
  volumes:
    - name: m2-cache
      persistentVolumeClaim:
        claimName: maven-m2-cache-pvc
