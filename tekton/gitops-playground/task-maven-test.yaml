apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: maven-test
spec:
  workspaces:
    - name: source
      description: The workspace containing the cloned source code
  steps:
    - name: unit-test
      image: eclipse-temurin:17-jdk-alpine
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        set -e
        echo "Running Maven Unit Tests..."
        
        # Configure maven to use a local directory within the workspace to cache dependencies
        mkdir -p .m2
        MAVEN_OPTS="-Dmaven.repo.local=$(workspaces.source.path)/.m2"
        
        # Ensure the mvnw script is executable
        chmod +x mvnw
        
        # Run the tests
        ./mvnw clean test -Dmaven.test.failure.ignore=true $MAVEN_OPTS
        
        echo "✅ Unit tests completed successfully!"
