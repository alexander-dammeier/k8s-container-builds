apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: maven-test
spec:
  workspaces:
    - name: source
      description: The workspace containing the cloned source code
  steps:
    - name: unit-test
      image: eclipse-temurin:17-jdk-alpine
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        set -e
        echo "Running Maven Unit Tests..."
        
        # Configure maven to use the dedicated PVC cache
        MAVEN_OPTS="-Dmaven.repo.local=/m2-cache"
        
        # Ensure the mvnw script is executable
        chmod +x mvnw
        
        # Run the tests
        ./mvnw test $MAVEN_OPTS
        
        echo "✅ Unit tests completed successfully!"
      volumeMounts:
        - name: m2-cache
          mountPath: /m2-cache
  volumes:
    - name: m2-cache
      persistentVolumeClaim:
        claimName: maven-m2-cache-pvc
