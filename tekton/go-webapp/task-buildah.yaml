apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: build-go-app
spec:
  workspaces:
    - name: source
      description: The workspace where the build will happen
  params:
    - name: git-url
      description: The URL of the git repository
      type: string
    - name: git-revision
      description: The revision/branch to build
      default: "main"
      type: string
  steps:
    - name: fetch-source
      image: alpine/git:latest
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        set -e
        echo "Cloning repository $(params.git-url) @ $(params.git-revision)..."
        git clone --branch "$(params.git-revision)" "$(params.git-url)" /tmp/source
        cp -R /tmp/source/* .
        echo "Repository cloned successfully."
        ls -la
    - name: build
      image: quay.io/buildah/stable:latest
      workingDir: $(workspaces.source.path)/go-webapp
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
      env:
        - name: STORAGE_DRIVER
          value: vfs
        - name: BUILDAH_ISOLATION
          value: chroot
        - name: HOME
          value: /home/build
        - name: CONTAINERS_STORAGE_CONF
          value: /var/lib/containers/storage.conf
        - name: REGISTRY_SERVER
          valueFrom:
            secretKeyRef:
              name: registry-credentials
              key: REGISTRY_SERVER
        - name: REGISTRY_USERNAME
          valueFrom:
            secretKeyRef:
              name: registry-credentials
              key: REGISTRY_USERNAME
        - name: REGISTRY_PASSWORD
          valueFrom:
            secretKeyRef:
              name: registry-credentials
              key: REGISTRY_PASSWORD
        - name: REGISTRY_IMAGE_URL
          valueFrom:
            secretKeyRef:
              name: registry-credentials
              key: REGISTRY_IMAGE_URL
      script: |
        #!/bin/sh
        set -e
        
        # Create a custom storage.conf that points to writable directories
        cat <<EOF > /var/lib/containers/storage.conf
        [storage]
        driver = "vfs"
        runroot = "/var/lib/containers/runroot"
        graphroot = "/var/lib/containers/storage"
        [storage.options]
        additionalimagestores = []
        [storage.options.vfs]
        ignore_chown_errors = "true"
        EOF

        echo "Logging into registry $REGISTRY_SERVER..."
        buildah login -u "$REGISTRY_USERNAME" -p "$REGISTRY_PASSWORD" "$REGISTRY_SERVER"
        
        echo "Building the image with Buildah..."
        buildah bud --format=docker --isolation=chroot -t "$REGISTRY_IMAGE_URL" -f Dockerfile .
        
        echo "Pushing the image to $REGISTRY_IMAGE_URL..."
        buildah push "$REGISTRY_IMAGE_URL"
        
        echo "✅ Build and push completed successfully!"
      volumeMounts:
        - name: buildah-storage
          mountPath: /var/lib/containers
    - name: deploy
      image: gcr.io/cloud-builders/kubectl:latest
      workingDir: $(workspaces.source.path)/go-webapp
      env:
        - name: REGISTRY_IMAGE_URL
          valueFrom:
            secretKeyRef:
              name: registry-credentials
              key: REGISTRY_IMAGE_URL
      script: |
        #!/bin/sh
        set -e
        echo "Deploying $REGISTRY_IMAGE_URL to Kubernetes..."
        
        # Replace the placeholder in the deployment manifest
        sed -i "s|REGISTRY_IMAGE_URL|$REGISTRY_IMAGE_URL|g" k8s.yaml
        
        # Apply the manifests from the workspace
        kubectl apply -f k8s.yaml
        
        echo "Waiting for deployment rollout..."
        kubectl rollout status deployment/go-webapp -n default --timeout=60s
        echo "✅ Deployment successful!"
  volumes:
    - name: buildah-storage
      emptyDir: {}
