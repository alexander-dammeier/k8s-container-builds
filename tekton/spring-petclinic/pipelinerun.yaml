apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  generateName: build-spring-petclinic-run-
spec:
  pipelineRef:
    name: build-spring-petclinic
  podTemplate:
    securityContext:
      seccompProfile:
        type: Unconfined
  taskRunSpecs:
    - pipelineTaskName: build-image
      metadata:
        annotations:
          container.apparmor.security.beta.kubernetes.io/step-build-and-push: unconfined
  workspaces:
    - name: shared-workspace
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi
  params:
    - name: git-url
      value: "https://github.com/cloudogu/spring-petclinic.git"
    - name: git-revision
      value: "feature/gitops_main"
    - name: image
      value: "registry.cloudogu.com/lerntag/spring-petclinic:latest"
    - name: skip-tests
      value: "true"
    - name: fail-on-severity
      value: "NONE"
