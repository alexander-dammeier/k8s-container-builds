apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: trivy-scan-petclinic
spec:
  params:
    - name: image
      description: The image to scan
      type: string
    - name: fail-on-severity
      description: Fail the build if vulnerabilities of this severity or higher are found (e.g., CRITICAL, HIGH). Set to "NONE" to never fail.
      type: string
      default: "NONE"
  steps:
    - name: scan
      image: aquasec/trivy:0.69.3
      env:
        - name: TRIVY_USERNAME
          valueFrom:
            secretKeyRef:
              name: registry-credentials
              key: REGISTRY_USERNAME
        - name: TRIVY_PASSWORD
          valueFrom:
            secretKeyRef:
              name: registry-credentials
              key: REGISTRY_PASSWORD
      script: |
        #!/bin/sh
        set -e
        echo "Performing full scan on $(params.image)..."
        
        # 1. Run full scan and save to JSON
        trivy image --format json --output trivy-report.json --ignore-unfixed "$(params.image)"
        
        echo ""
        echo "==============================================================="
        echo "   CRITICAL VULNERABILITIES SUMMARY"
        echo "==============================================================="
        # 2. Use 'trivy convert' to extract and display ONLY critical vulnerabilities from the JSON report
        trivy convert --severity CRITICAL trivy-report.json
        
        echo ""
        echo "==============================================================="
        
        # 3. Check if we should fail the build based on the parameter
        if [ "$(params.fail-on-severity)" != "NONE" ]; then
          echo "Checking if we should fail due to $(params.fail-on-severity) vulnerabilities..."
          # Use 'trivy convert' for the failure check as well
          trivy convert --severity "$(params.fail-on-severity)" --exit-code 1 trivy-report.json
        else
          echo "Skipping failure check (fail-on-severity is set to NONE)."
        fi
        
        echo "✅ Scan completed."
