apiVersion: operator.tekton.dev/v1alpha1
kind: TektonConfig
metadata:
  name: config
spec:
  profile: all
  targetNamespace: tekton-pipelines
  dashboard:
    readonly: false
  # Disable Results (removes Postgres and Results API)
  result:
    disabled: true
  # Disable Chains (removes security signing controller)
  chain:
    disabled: true
  # Disable Triggers (removes event listener controllers)
  trigger:
    disabled: true
  pruner:
    resources:
      - taskrun
      - pipelinerun
    keep: 50
    schedule: "0 0 * * *"
